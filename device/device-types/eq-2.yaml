id: eq-2
name: Source Audio EQ2
manufacturer: Source Audio
description: >-
  Source Audio EQ2 Programmable EQ (One Series, SA270). Full MIDI: 128 presets
  recallable via Program Change, and effectively every DSP parameter reachable
  via Control Change. The CC numbers below are the FACTORY DEFAULT map,
  transcribed verbatim from the official "EQ2 Programmable Equalizer MIDI Mapping
  Table". Note the map is GLOBAL and user-remappable in the Neuro Desktop Editor
  (Device > Edit Device MIDI Map): if a rig has remapped it, either restore the
  defaults or re-bind via MIDI-learn. A handful of parameters have NO factory CC
  (band type, channel config/phase, split, limiter, gate, switch assign/action,
  external-control enable) — assign them a CC in Neuro and add them here. MIDI
  over 5-pin DIN / USB; default receive channel is 1 (channel comes from the
  binding here). See docs/research/eq-2.md.
transport: blemidi
settle_ms: 50   # not specified by Source Audio; conservative wait for a recalled preset to load before CC overrides
controls:
  # --- Preset recall --------------------------------------------------------
  - name: preset
    description: >-
      Recall any of the 128 presets via Program Change (PC 0 = preset 1). The
      reliable, unambiguous recall path. Tip: save a preset in its bypassed
      state to "queue up" a sound without engaging it on recall.
    type: program_change
    value: { type: range, min: 0, max: 127 }
  - name: recall_preset_bypassed
    description: Recall a preset (value = preset number) in the BYPASSED state (CC103).
    type: cc
    cc: 103
    value: { type: range, min: 0, max: 127 }
  - name: recall_preset_engaged
    description: Recall a preset (value = preset number) in the ENGAGED state (CC104).
    type: cc
    cc: 104
    value: { type: range, min: 0, max: 127 }
  - name: preset_increment
    description: Step to the next preset (any value triggers).
    type: cc
    cc: 82
    value: { type: range, min: 0, max: 127 }
  - name: preset_decrement
    description: Step to the previous preset (any value triggers).
    type: cc
    cc: 80
    value: { type: range, min: 0, max: 127 }

  # --- Bypass / engage ------------------------------------------------------
  - name: bypass_engage
    description: Universal Bypass. Value < 64 = bypass, value >= 64 = engage (CC101).
    type: cc
    cc: 101
    value: { type: enum, values: { bypass: 0, engage: 127 } }
  - name: toggle_bypass_engage
    description: Toggle bypass/engage (any value triggers; CC102).
    type: cc
    cc: 102
    value: { type: range, min: 0, max: 127 }

  # --- Master / input levels ------------------------------------------------
  - name: master_volume
    description: Master output volume (CC0). 0 = -inf, 64 = unity, 127 = +12 dB.
    type: cc
    cc: 0
    value: { type: range, min: 0, max: 127 }
  - name: input1_trim
    description: Input 1 trim (CC1). 0 = -inf, 64 = unity, 127 = +6 dB.
    type: cc
    cc: 1
    value: { type: range, min: 0, max: 127 }
  - name: input2_trim
    description: Input 2 trim (CC2). 0 = -inf, 64 = unity, 127 = +6 dB.
    type: cc
    cc: 2
    value: { type: range, min: 0, max: 127 }
  - name: ch1_gain
    description: Channel 1 gain (CC69). 0 = -18 dB, 18 = 0 dB, 36 = +18 dB.
    type: cc
    cc: 69
    value: { type: range, min: 0, max: 36, unit: dB }
  - name: ch2_gain
    description: Channel 2 gain (CC70). 0 = -18 dB, 18 = 0 dB, 36 = +18 dB.
    type: cc
    cc: 70
    value: { type: range, min: 0, max: 36, unit: dB }

  # --- Input high-pass filters ----------------------------------------------
  - name: ch1_highpass
    description: Channel 1 input high-pass (CC71). 0 = 10 Hz, 28 = 80 Hz (0.5 Hz/step).
    type: cc
    cc: 71
    value: { type: range, min: 0, max: 28, unit: Hz }
  - name: ch2_highpass
    description: Channel 2 input high-pass (CC72). 0 = 10 Hz, 28 = 80 Hz (0.5 Hz/step).
    type: cc
    cc: 72
    value: { type: range, min: 0, max: 28, unit: Hz }

  # --- Routing --------------------------------------------------------------
  - name: routing_option
    description: >-
      Signal routing (CC73). 0 = Auto Detect, 1 = Mono->Stereo, 2 = Stereo->Stereo,
      3 = Stereo->Mono, 4 = Mono->Mono.
    type: cc
    cc: 73
    value: { type: int, min: 0, max: 4 }   # TODO: confirm 4's label (truncated in the mapping PDF; Mono->Mono assumed)

  # --- External control / tuner ---------------------------------------------
  - name: remote_expression
    description: Remote expression input when using MIDI as the external control source (CC100).
    type: cc
    cc: 100
    value: { type: range, min: 0, max: 127 }
  - name: remote_switch
    description: Remote switch function (CC94; latching only, any value).
    type: cc
    cc: 94
    value: { type: range, min: 0, max: 127 }
  - name: tuner
    description: Enable/disable the tuner (CC83). Any value toggles the tuner display.
    type: cc
    cc: 83
    value: { type: range, min: 0, max: 127 }

