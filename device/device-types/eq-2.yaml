# Parameters with NO factory default CC in the mapping table (assign a CC to
# them in the Neuro Desktop Editor, then add them here as cc controls):
#   - Band Type (Ch1 B1, Ch1 B10, Ch2 B1, Ch2 B10): 0 = Peak, 1 = Shelving
#   - Channel Config (Ch1/Ch2): 0 = Parallel (Graphic), 1 = Series (Parametric)
#   - Channel Phase (Ch1/Ch2): 0 = Normal, 1 = Inverted
#   - Split Channels: 0 = OFF (linked), 1 = ON (independent Ch2 EQ)
#   - Limiter Enable / Look-ahead / Stereo Link: 0 = OFF, 1 = ON
#   - Gate Enable: 0 = OFF, 1 = Both, 2 = Ch1, 3 = Ch2
#   - Gate Threshold: 0 = -100 dB .. 75 = -25 dB
#   - Gate Source: 0 = Ch1, 1 = Ch2
#   - Switch Assign (0-4) / Switch Action (0 = Momentary, 1 = Latching)
#   - Enable External Control: 0 = OFF, 1 = ON

# --- USB editor/readback profile (Neuro HID, NOT USB-MIDI) -------------------
# The EQ2 exposes its real device state over its VENDOR HID interface (the
# channel the Neuro Desktop editor uses), not over USB-MIDI (which only carries
# standard PC/CC). The protocol (reverse-engineered on the sibling C4 Synth and
# confirmed live on the EQ2, read-only) is: write `0x36 <a2 a1 a0>` to dump 32
# bytes from a 24-bit address; write `0x77 <preset>` to select a preset. There
# is no identity request. The 128 presets live at base 0x080000, stride 0x1000.
# Per-parameter byte offsets inside a preset block are mostly undecoded (only
# the preset name at +0x097 and a band-frequency table at +0x033 are located),
# so no semantic params are mapped yet — use <logical>_read_preset to dump a
# block and the generic <logical>_read {region: presets, index, addr} to reach a
# located field. See docs/research/eq-2.md.
usb:
  protocol: neuro-hid
  transport: usbhid
  endpoint: "29A4:0400"   # VID:PID (the binding may override with /dev/hidrawN)
  regions:
    presets: { base: 0x080000, count: 128, stride: 0x1000 }
  # Located-but-not-yet-semantic offsets within a preset block (read via
  # <logical>_read {region: presets, index: N, addr: <offset>, size: 32}):
  #   +0x097  ASCII preset name (NUL/0xFF padded) — "which preset is in this slot"
  #   +0x033  10x 16-bit little-endian band-frequency centers (appears twice: Ch1/Ch2)
  #   +0x080  header flags (01 00 00 7F.. on a used block; FF.. = empty slot)
